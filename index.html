<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCLEX Survival: Choose Your Own Adventure</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --panel-bg: #1e293b;
            --warning-color: #f59e0b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            max-width: 800px;
            width: 100%;
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            color: var(--accent-color);
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1em;
        }
        .stat-strikes { color: var(--danger-color); }
        .stat-score { color: var(--success-color); }
        
        #scenario-box {
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
        }
        .instructor-note {
            background-color: rgba(245, 158, 11, 0.1);
            padding: 15px;
            border-left: 4px solid var(--warning-color);
            margin: 15px 0;
            font-style: italic;
            color: #fcd34d;
            animation: fadeIn 0.3s ease;
        }
        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button {
            background-color: #334155;
            color: white;
            border: 2px solid #475569;
            padding: 15px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }
        button:hover {
            background-color: #475569;
            border-color: var(--accent-color);
            transform: translateX(5px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #feedback-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            animation: fadeIn 0.5s ease;
        }
        .feedback-success { background-color: rgba(16, 185, 129, 0.2); border: 1px solid var(--success-color); color: #34d399; }
        .feedback-rehab { background-color: rgba(245, 158, 11, 0.2); border: 1px solid var(--warning-color); color: #fbbf24; }
        .feedback-death { background-color: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger-color); color: #f87171; }
        
        #next-btn {
            display: none;
            width: 100%;
            margin-top: 20px;
            background-color: var(--accent-color);
            color: #000;
            text-align: center;
            font-weight: bold;
        }
        #next-btn:hover {
            background-color: #0ea5e9;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <h1>NCLEX Nightmares: The Shift from Hell</h1>
    
    <div class="stats-bar">
        <div class="stat-score">Score: <span id="score">0</span></div>
        <div class="stat-cases">Cases Left: <span id="cases-left">0</span></div>
        <div class="stat-strikes">Malpractice Strikes: <span id="strikes">0</span>/5</div>
    </div>

    <div id="scenario-box">Loading your patient assignment...</div>
    <div id="options-container" class="btn-grid"></div>
    
    <div id="feedback-box">
        <h3 id="outcome-title"></h3>
        <p id="rationale-text"></p>
    </div>

    <button id="next-btn" onclick="advanceGame()">Next Patient</button>
</div>

/* =========================================================================
   GAME ENGINE LOGIC
========================================================================= */

let sessionCases = [];
let currentCase = null;
let score = 0;
let strikes = 0;
const MAX_STRIKES = 5;

const scoreEl = document.getElementById('score');
const strikesEl = document.getElementById('strikes');
const casesLeftEl = document.getElementById('cases-left');
const scenarioBox = document.getElementById('scenario-box');
const optionsContainer = document.getElementById('options-container');
const feedbackBox = document.getElementById('feedback-box');
const outcomeTitle = document.getElementById('outcome-title');
const rationaleText = document.getElementById('rationale-text');
const nextBtn = document.getElementById('next-btn');

function initGame() {
    sessionCases = [...masterDatabase].sort(() => Math.random() - 0.5);
    score = 0;
    strikes = 0;
    updateStats();
    loadNextCase();
}

function updateStats() {
    scoreEl.innerText = score;
    strikesEl.innerText = strikes;
    casesLeftEl.innerText = sessionCases.length + (currentCase ? 1 : 0);
}

function loadNextCase() {
    feedbackBox.style.display = 'none';
    nextBtn.style.display = 'none';
    
    if (strikes >= MAX_STRIKES) {
        endGame(false);
        return;
    }

    if (sessionCases.length === 0) {
        endGame(true);
        return;
    }

    currentCase = sessionCases.pop();
    updateStats();
    
    scenarioBox.innerHTML = `<strong>Situation:</strong> ${currentCase.scenario}<br><br><em>What is your initial action?</em>`;
    renderOptions(currentCase.options, 'option');
}

function renderOptions(optionsArray, type) {
    optionsContainer.innerHTML = '';
    
    let shuffledOptions = [...optionsArray].sort(() => Math.random() - 0.5);

    shuffledOptions.forEach((opt) => {
        const btn = document.createElement('button');
        btn.innerText = opt.text;
        
        if (type === 'option') {
            btn.onclick = () => handleMainOptionSelect(opt);
        } else {
            btn.onclick = () => handleFollowUpSelect(opt);
        }
        
        optionsContainer.appendChild(btn);
    });
}

function handleMainOptionSelect(selectedOption) {
    // This injects the choice AND the new instructor comment!
    scenarioBox.innerHTML = `
        <strong>Action taken:</strong> ${selectedOption.text}
        <div class="instructor-note">
            <strong>Charge Nurse says:</strong> "${selectedOption.instructorComment}"
        </div>
        <em>The situation evolves. What is your follow-up action?</em>
    `;
    renderOptions(selectedOption.followUps, 'followup');
}

function handleFollowUpSelect(selectedFollowUp) {
    const btns = optionsContainer.querySelectorAll('button');
    btns.forEach(btn => btn.disabled = true);

    processOutcome(selectedFollowUp.outcome, selectedFollowUp.rationale);
}

function processOutcome(outcomeType, rationale) {
    feedbackBox.className = '';
    feedbackBox.style.display = 'block';
    
    if (outcomeType === 'stability') {
        score += 100;
        feedbackBox.classList.add('feedback-success');
        outcomeTitle.innerText = "✅ OUTCOME: Hemodynamic Stability";
    } else if (outcomeType === 'rehab') {
        strikes += 1;
        feedbackBox.classList.add('feedback-rehab');
        outcomeTitle.innerText = "⚠️ OUTCOME: Severe Complications (Rehab Required)";
    } else if (outcomeType === 'death') {
        strikes += 1; 
        feedbackBox.classList.add('feedback-death');
        outcomeTitle.innerText = "💀 OUTCOME: Patient Death";
    }

    rationaleText.innerText = rationale;
    updateStats();
    nextBtn.style.display = 'block';

    if (strikes >= MAX_STRIKES) {
        nextBtn.innerText = "Face the Board of Nursing (Game Over)";
    } else if (sessionCases.length === 0) {
        nextBtn.innerText = "Clock Out (You Survived)";
    } else {
        nextBtn.innerText = "Take Next Patient";
    }
}

function advanceGame() {
    if (strikes >= MAX_STRIKES) {
        endGame(false);
    } else if (sessionCases.length === 0) {
        endGame(true);
    } else {
        loadNextCase();
    }
}

function endGame(won) {
    scenarioBox.innerHTML = won 
        ? `<strong>SHIFT OVER!</strong><br>Against all odds, you didn't lose your license today. Go home, rest up, because tomorrow is another day of NCLEX Nightmares.` 
        : `<strong>LICENSE REVOKED!</strong><br>You accumulated ${MAX_STRIKES} malpractice strikes. The Board of Nursing has determined you are a danger to the public. Please hand over your badge and stethoscope.`;
    
    optionsContainer.innerHTML = '';
    feedbackBox.style.display = 'none';
    
    const restartBtn = document.createElement('button');
    restartBtn.innerText = "Restart Shift (Play Again)";
    restartBtn.style.backgroundColor = 'var(--accent-color)';
    restartBtn.style.color = '#000';
    restartBtn.style.fontWeight = 'bold';
    restartBtn.onclick = initGame;
    optionsContainer.appendChild(restartBtn);
    
    nextBtn.style.display = 'none';
}

window.onload = initGame;

</script>
